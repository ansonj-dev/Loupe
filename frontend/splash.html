<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Loupe</title>
<meta name="theme-color" content="#0D0D0A" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark:    #0D0D0A;
  --paper:   #F4F5F0;
  --ink:     #15171B;
  --red:     #E14F3A;
  --amber:   #F2A93B;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--dark);
}

/* ════════════════════════════════════════════
   SPLASH SHELL
════════════════════════════════════════════ */
#splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--dark);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── Amber safelight radiating from center ── */
.safelight {
  position: absolute;
  inset: -20%;
  border-radius: 50%;
  background: radial-gradient(
    ellipse 60% 60% at 50% 50%,
    rgba(242, 169, 59, 0.55) 0%,
    rgba(242, 169, 59, 0.18) 40%,
    transparent 70%
  );
  opacity: 0;
  transform: scale(0.2);
  animation: safelight-bloom 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.1s;
  pointer-events: none;
}

@keyframes safelight-bloom {
  0%   { opacity: 0;    transform: scale(0.2); }
  35%  { opacity: 1;    transform: scale(1.0); }
  70%  { opacity: 0.6;  transform: scale(1.05); }
  100% { opacity: 0;    transform: scale(1.1); }
}

/* ── Film-grain texture (SVG noise filter) ── */
.grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  animation: grain-appear 0.4s ease forwards 0.8s;
}

.grain svg { width: 100%; height: 100%; }

@keyframes grain-appear {
  to { opacity: 0.032; }
}

/* ── Paper surface that "develops" outward ── */
.paper {
  position: absolute;
  inset: 0;
  background: var(--paper);
  clip-path: circle(0% at 50% 50%);
  animation: paper-develop 0.85s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.55s;
}

@keyframes paper-develop {
  0%   { clip-path: circle(0%   at 50% 50%); }
  100% { clip-path: circle(120% at 50% 50%); }
}

/* ── Scan sweep line ── */
.scan-line {
  position: absolute;
  left: 0; right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(242,169,59,0.3) 10%,
    var(--amber) 40%,
    var(--amber) 60%,
    rgba(242,169,59,0.3) 90%,
    transparent 100%
  );
  filter: blur(0.5px);
  opacity: 0;
  pointer-events: none;
  animation: scan-sweep 1.1s cubic-bezier(0.4, 0, 0.6, 1) forwards 2.85s;
}

/* trailing glow on scan */
.scan-line::after {
  content: '';
  position: absolute;
  inset: -8px 0;
  background: inherit;
  filter: blur(6px);
  opacity: 0.5;
}

@keyframes scan-sweep {
  0%   { top: -3px;  opacity: 0; }
  4%   { opacity: 1; }
  96%  { opacity: 1; }
  100% { top: 100%;  opacity: 0; }
}

/* ════════════════════════════════════════════
   CENTER CONTENT
════════════════════════════════════════════ */
.center {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  /* made visible once paper is ready */
  opacity: 0;
  animation: center-appear 0.01s forwards 0.9s;
}

@keyframes center-appear { to { opacity: 1; } }

/* ════════════════════════════════════════════
   LOGO MARK SVG
════════════════════════════════════════════ */
.logo-svg {
  width: 140px;
  height: 140px;
  overflow: visible;
}

/* Film frame — draws clockwise from top-left corner */
.frame-path {
  fill: none;
  stroke: var(--ink);
  stroke-width: 4.5;
  stroke-linejoin: miter;
  /* perimeter of 164×164 rect = 656px */
  stroke-dasharray: 656;
  stroke-dashoffset: 656;
  animation: draw-path 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.05s;
}

@keyframes draw-path { to { stroke-dashoffset: 0; } }

/* Inner tick marks on frame (like film sprocket holes) */
.tick {
  stroke: var(--ink);
  stroke-width: 2;
  opacity: 0;
  animation: tick-appear 0.25s ease forwards;
}
.tick-t { animation-delay: 1.55s; }
.tick-r { animation-delay: 1.62s; }
.tick-b { animation-delay: 1.69s; }
.tick-l { animation-delay: 1.76s; }

@keyframes tick-appear { to { opacity: 0.22; } }

/* Loupe circle — traces clockwise from 12 o'clock */
.circle-path {
  fill: none;
  stroke: var(--red);
  stroke-width: 6;
  stroke-linecap: round;
  /* circumference of r=40: 2π×40 ≈ 251px */
  /* show 226px (≈ 324°), leave 25px gap at start  */
  stroke-dasharray: 226 25;
  stroke-dashoffset: 251;
  animation: draw-circle 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.62s;
}

@keyframes draw-circle { to { stroke-dashoffset: 0; } }

/* Handle — snaps in with spring overshoot */
.handle-path {
  fill: none;
  stroke: var(--red);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 52;
  stroke-dashoffset: 52;
  animation: draw-handle 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.25s;
}

@keyframes draw-handle { to { stroke-dashoffset: 0; } }

/* ════════════════════════════════════════════
   WORDMARK — each letter clips up from below
════════════════════════════════════════════ */
.wordmark {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-weight: 700;
  font-size: clamp(48px, 10vw, 68px);
  letter-spacing: -0.045em;
  color: var(--ink);
  line-height: 1;
  display: flex;
  gap: 0.01em;
}

/* clip container so translate creates a reveal */
.lw {
  display: inline-block;
  overflow: hidden;
  padding-bottom: 0.06em; /* prevent descender clip */
}

.ll {
  display: inline-block;
  transform: translateY(110%) rotate(4deg);
  opacity: 0;
  animation: letter-stamp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.ll:nth-child(1)  { animation-delay: 2.1s; }
.ll:nth-child(2)  { animation-delay: 2.18s; }
.ll:nth-child(3)  { animation-delay: 2.26s; }
.ll:nth-child(4)  { animation-delay: 2.34s; }
.ll:nth-child(5)  { animation-delay: 2.42s; }

@keyframes letter-stamp {
  0%   { transform: translateY(110%) rotate(4deg);   opacity: 0; }
  60%  { transform: translateY(-4%) rotate(-0.8deg); opacity: 1; }
  80%  { transform: translateY(2%)  rotate(0.3deg);  opacity: 1; }
  100% { transform: translateY(0)   rotate(0deg);    opacity: 1; }
}

/* ════════════════════════════════════════════
   TAGLINE
════════════════════════════════════════════ */
.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(10px, 2vw, 12px);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(21, 23, 27, 0.4);
  opacity: 0;
  transform: translateY(10px);
  animation: tagline-rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards 2.65s;
}

@keyframes tagline-rise {
  to { opacity: 1; transform: translateY(0); }
}

/* ════════════════════════════════════════════
   FRAME NUMBER (film aesthetic detail)
════════════════════════════════════════════ */
.frame-number {
  position: absolute;
  bottom: -28px;
  right: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(21, 23, 27, 0.25);
  opacity: 0;
  animation: tagline-rise 0.5s ease forwards 2.0s;
}

/* ════════════════════════════════════════════
   EXIT — white flash, then dissolve
════════════════════════════════════════════ */
#splash.is-out {
  animation: splash-exit 0.72s cubic-bezier(0.4, 0, 1, 1) forwards;
}

@keyframes splash-exit {
  0%   { opacity: 1; }
  25%  { opacity: 1; background: #ffffff; }
  100% { opacity: 0; background: #ffffff; }
}
</style>
</head>
<body>

<div id="splash" role="img" aria-label="Loupe — loading">

  <!-- LAYER 1: amber safelight -->
  <div class="safelight" aria-hidden="true"></div>

  <!-- LAYER 2: paper develops -->
  <div class="paper" aria-hidden="true"></div>

  <!-- LAYER 3: film grain -->
  <div class="grain" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg">
      <filter id="grain-filter" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4"
                      stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="1"/>
    </svg>
  </div>

  <!-- LAYER 4: center content -->
  <div class="center">

    <!-- Logo mark -->
    <div style="position:relative">
      <svg class="logo-svg" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg"
           aria-hidden="true">

        <!-- Film frame: M18 18 → 162 18 → 162 162 → 18 162 Z (perimeter 4×144=576, adjusted) -->
        <path class="frame-path"
              d="M 18 18 L 162 18 L 162 162 L 18 162 Z" />

        <!-- Tick marks (sprocket-hole accent) -->
        <line class="tick tick-t" x1="90" y1="14" x2="90" y2="22" />
        <line class="tick tick-r" x1="166" y1="90" x2="158" y2="90" />
        <line class="tick tick-b" x1="90" y1="166" x2="90" y2="158" />
        <line class="tick tick-l" x1="14" y1="90" x2="22" y2="90" />

        <!-- Loupe circle: cx=84, cy=84, r=40 -->
        <!-- circumference = 251.3, rotate so starts at 12 o'clock -->
        <circle class="circle-path"
                cx="84" cy="84" r="40"
                transform="rotate(-90 84 84)" />

        <!-- Handle from circle edge ~135° to corner-ish -->
        <!-- circle edge at 45°: 84+40cos45=84+28.3=112.3, 84+40sin45=112.3 -->
        <line class="handle-path"
              x1="112" y1="112" x2="150" y2="150" />

      </svg>
      <span class="frame-number">FRAME 001 ·  35mm</span>
    </div>

    <!-- Wordmark -->
    <div class="wordmark" aria-label="LOUPE">
      <span class="lw"><span class="ll">L</span></span>
      <span class="lw"><span class="ll">O</span></span>
      <span class="lw"><span class="ll">U</span></span>
      <span class="lw"><span class="ll">P</span></span>
      <span class="lw"><span class="ll">E</span></span>
    </div>

    <!-- Tagline -->
    <p class="tagline">circle the keeper</p>

  </div>

  <!-- Scan line sweep -->
  <div class="scan-line" aria-hidden="true"></div>

</div>

<script>
(function () {
  var splash  = document.getElementById('splash');
  var TOTAL   = 4200;   // ms before exit starts
  var EXIT_MS = 720;    // ms for exit animation

  // Skip if already seen this session (for overlay usage)
  if (sessionStorage.getItem('loupe-splash-done')) {
    splash.remove();
    return;
  }

  // Begin exit
  setTimeout(function () {
    splash.classList.add('is-out');

    setTimeout(function () {
      splash.remove();
      sessionStorage.setItem('loupe-splash-done', '1');

      // If this is the standalone splash.html, redirect into the app
      var isStandalone = window.location.pathname.replace(/\\/g, '/').split('/').pop() === 'splash.html';
      if (isStandalone) {
        var dest = new URLSearchParams(window.location.search).get('to') || './index.html';
        window.location.replace(dest);
      }
    }, EXIT_MS);

  }, TOTAL);

  // Skip on tap (for users who've seen it before)
  var hasInteracted = false;
  splash.addEventListener('click', function () {
    if (hasInteracted) return;
    hasInteracted = true;
    setTimeout(function () {
      splash.classList.add('is-out');
      setTimeout(function () {
        splash.remove();
        sessionStorage.setItem('loupe-splash-done', '1');
        var isStandalone = window.location.pathname.replace(/\\/g, '/').split('/').pop() === 'splash.html';
        if (isStandalone) window.location.replace('./index.html');
      }, EXIT_MS);
    }, 200);
  }, { once: false });

})();
</script>
</body>
</html>
